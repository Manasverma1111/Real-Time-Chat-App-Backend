# Application configuration for Message Service
spring.application.name=message-service

# Server configuration
server.port=8083

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_messageservice
spring.datasource.username=root
spring.datasource.password=root#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RabbitMQ listener configuration
# Force connection early
spring.rabbitmq.listener.simple.auto-startup=true
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.max-attempts=3
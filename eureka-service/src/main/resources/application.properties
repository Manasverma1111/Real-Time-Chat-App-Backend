# Eureka service name
spring.application.name=eureka-service

# Server port (Render dynamically injects PORT in production)
server.port=${PORT:8761}

# Disable Eureka client registration for the server itself
eureka.client.register-with-eureka=false

# Disable fetching registry since this is the Eureka server
eureka.client.fetch-registry=false

# Start immediately without waiting for peer sync
eureka.server.wait-time-in-ms-when-sync-empty=0

# Enable self-preservation to prevent accidental deregistration
eureka.server.enable-self-preservation=true

# Expose all actuator endpoints
management.endpoints.web.exposure.include=*

# Show detailed health information
management.endpoint.health.show-details=always
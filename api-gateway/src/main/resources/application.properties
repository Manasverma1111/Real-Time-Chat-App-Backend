# API Gateway Configuration
spring.application.name=api-gateway

# Server configuration
server.port=8087

# CORS CONFIGURATION
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# AUTH SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**,/oauth2/**,/login/**

# ROOM SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=room-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/rooms/**

# MESSAGE SERVICE
spring.cloud.gateway.server.webflux.routes[2].id=message-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/messages/**


# MEDIA SERVICE
spring.cloud.gateway.server.webflux.routes[3].id=media-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8086
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/media/**

# WEBSOCKET ROUTING
spring.cloud.gateway.server.webflux.routes[4].id=ws-service
spring.cloud.gateway.server.webflux.routes[4].uri=ws://localhost:8083
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/ws/**

# PRESENCE SERVICE
spring.cloud.gateway.server.webflux.routes[5].id=presence-service
spring.cloud.gateway.server.webflux.routes[5].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/presence/**

# NOTIFICATION SERVICE
spring.cloud.gateway.server.webflux.routes[6].id=notification-service
spring.cloud.gateway.server.webflux.routes[6].uri=http://localhost:8085
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/notifications/**

# SWAGGER / OPENAPI CONFIGURATION
springdoc.swagger-ui.path=/swagger-ui.html

# SWAGGER AGGREGATED SERVICES
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/aggregate/auth-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=room-service
springdoc.swagger-ui.urls[1].url=/aggregate/room-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=message-service
springdoc.swagger-ui.urls[2].url=/aggregate/message-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=media-service
springdoc.swagger-ui.urls[3].url=/aggregate/media-service/v3/api-docs

# AUTH SERVICE SWAGGER ROUTE
spring.cloud.gateway.server.webflux.routes[7].id=auth-service-swagger
spring.cloud.gateway.server.webflux.routes[7].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/aggregate/auth-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/aggregate/auth-service/(?<segment>.*), /$\{segment}

# ROOM SERVICE SWAGGER ROUTE
spring.cloud.gateway.server.webflux.routes[8].id=room-service-swagger
spring.cloud.gateway.server.webflux.routes[8].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/aggregate/room-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[8].filters[0]=RewritePath=/aggregate/room-service/(?<segment>.*), /$\{segment}

# MESSAGE SERVICE SWAGGER ROUTE

spring.cloud.gateway.server.webflux.routes[9].id=message-service-swagger
spring.cloud.gateway.server.webflux.routes[9].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/aggregate/message-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[9].filters[0]=RewritePath=/aggregate/message-service/(?<segment>.*), /$\{segment}

# MEDIA SERVICE SWAGGER ROUTE
spring.cloud.gateway.server.webflux.routes[10].id=media-service-swagger
spring.cloud.gateway.server.webflux.routes[10].uri=http://localhost:8086
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/aggregate/media-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[10].filters[0]=RewritePath=/aggregate/media-service/(?<segment>.*), /$\{segment}
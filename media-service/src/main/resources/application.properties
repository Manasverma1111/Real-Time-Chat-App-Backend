spring.application.name=media-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_mediaservice
spring.datasource.username=root
spring.datasource.password=root#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

file.upload-dir=uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# AWS S3 Configuration
aws.access-key=YOUR_ACCESS_KEY
aws.secret-key=YOUR_SECRET_KEY
aws.region=ap-south-1
aws.s3.bucket-name=connecthub-media-storage

# Optional
aws.s3.base-url=https://connecthub-media-storage.s3.ap-south-1.amazonaws.com
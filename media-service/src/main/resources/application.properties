# Application Configuration for Media Service
spring.application.name=media-service

# Server Configuration
server.port=8086

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_mediaservice
spring.datasource.username=root
spring.datasource.password=root#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
# Automatically create/update database tables based on JPA entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# AWS S3 Configuration
# Replace the following values with your actual AWS credentials and bucket information
aws.access-key=YOUR_ACCESS_KEY
aws.secret-key=YOUR_SECRET_KEY
aws.region=ap-south-1
aws.s3.bucket-name=connecthub-media-storage

# Base URL for accessing media files from S3
aws.s3.base-url=https://connecthub-media-storage.s3.ap-south-1.amazonaws.com

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

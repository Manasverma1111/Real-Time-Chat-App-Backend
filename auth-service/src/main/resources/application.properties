spring.application.name=auth-service

server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_auth
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=connecthubsupersecretkeyconnecthubsupersecretkey1234567890abcd
jwt.expiration=86400000

spring.security.oauth2.client.registration.google.client-id=${CONNECTHUB_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${CONNECTHUB_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
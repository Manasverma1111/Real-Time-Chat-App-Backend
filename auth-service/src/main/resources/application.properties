# Application name registered in Eureka
spring.application.name=auth-service

# Auth service port
server.port=8081

# MySQL database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/connecthub_authservice
spring.datasource.username=root
spring.datasource.password=root#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
jwt.secret=connecthubsupersecretkeyconnecthubsupersecretkey1234567890abcd
jwt.expiration=86400000

# Google OAuth2 client configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Google OAuth2 provider endpoints
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Eureka server URL
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/